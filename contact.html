<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – Portfolio of Rafael Ibayev</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Lora:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-wrapper">
                <div class="logo-section"><div class="logo">RI</div></div>
                <ul class="nav-menu"><li><a href="index.html">Home</a></li><li><a href="projects.html">Projects</a></li><li><a href="contact.html" class="active">Contact</a></li></ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="contact-header">
            <div class="container"><h1>Get in Touch</h1></div>
        </section>

        <section class="contact-section">
            <div class="container">
                <div class="contact-grid">
                    <div class="contact-form-wrapper">
                        <h2>Send me a message</h2>
                        <form class="contact-form" id="contactForm" method="post" action="mailto:raffaelwhat@gmail.com" enctype="text/plain">
                            <div class="form-group">
                                <label for="name">Your Name</label> <input type="text" id="name" name="name" required maxlength="100" placeholder="John Doe"> </div>

                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" name="email" required maxlength="100" placeholder="your@email.com">
                            </div>

                            <div class="form-group">
                                <label for="interest">Area of Interest</label> <div class="radio-group">
                                    <label class="radio-label">
                                        <input type="radio" id="development" name="interest" value="development" checked>
                                        <span>Software Development</span>
                                    </label>
                                    <label class="radio-label">
                                        <input type="radio" id="ai_robotics" name="interest" value="ai">
                                        <span>AI / Robotics</span>
                                    </label>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="message">Message</label> <textarea id="message" name="message" required maxlength="1000" placeholder="Tell me about your project..." rows="6"></textarea>
                            </div>

                            <div class="form-group checkbox-group">
                                <label class="checkbox-label" for="consent"> <input type="checkbox" id="consent" name="consent" required>
                                    <span>I'm interested in collaboration opportunities</span>
                                </label>
                            </div>

                            <button type="submit" class="btn btn-primary btn-large">Send Message</button>
                            <button type="reset" class="btn btn-secondary btn-large">Clear</button>
                        </form>
                    </div>
                    </div>
            </div>
        </section>
    </main>
</body>
</html>
